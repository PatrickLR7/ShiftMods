services:
  - type: web
    name: shiftmods-api
    env: python
    rootDir: shift-mods-api
    buildCommand: pip install uv && uv sync --no-dev && uv run alembic upgrade head
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_SCHEMA
        value: shift-mods
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GEMINI_API_KEY
        sync: false
      - key: SHOPIFY_STOREFRONT_API_URL
        sync: false
      - key: SHOPIFY_STOREFRONT_ACCESS_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
